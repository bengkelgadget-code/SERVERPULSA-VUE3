name: Daily Digiflazz Sync

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Digiflazz Sync Edge Function
        run: |
          curl -X POST "https://slkdoaeacjxgkviicaot.supabase.co/functions/v1/api/sync-digiflazz" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{}'