name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Memungkinkan build manual dari tab Actions

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install npm dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=https://slkdoaeacjxgkviicaot.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON_KEY=sb_publishable_Hb_fii3GCvufN1N9Wqs60g_Mkkm_U9W" >> .env
          echo "VITE_NEXTJS_API_URL=https://slkdoaeacjxgkviicaot.supabase.co/functions/v1" >> .env

      - name: Build Web Assets (Vite)
        run: npm run build

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Build APK (Debug)
        working-directory: ./android
        run: |
          sudo apt-get install -y dos2unix
          dos2unix ./gradlew
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
